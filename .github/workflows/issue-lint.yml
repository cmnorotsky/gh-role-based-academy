name: Issue Lint
on:
  issues:
    types: [opened, edited]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue body fields
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || "";
            const required = ["Role", "Module", "Learning objective", "Definition of done"];
            const missing = required.filter(r => !body.includes(r));
            if (missing.length > 0) {
              core.setFailed(`Missing required fields: ${missing.join(", ")}`);
            }
